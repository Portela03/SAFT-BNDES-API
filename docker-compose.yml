services:
  postgres:
    image: postgres:16
    container_name: saft-bndes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: saftbndes
      POSTGRES_USER: saft
      POSTGRES_PASSWORD: saft
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
